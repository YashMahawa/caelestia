# Keyring and auth
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard history
# exec-once = wl-paste --type text --watch cliphist store
# exec-once = wl-paste --type image --watch cliphist store

# Auto delete trash 30 days old
exec-once = trash-empty 30

# Cursors
exec-once = hyprctl setcursor $cursorTheme $cursorSize
exec-once = gsettings set org.gnome.desktop.interface cursor-theme '$cursorTheme'
exec-once = gsettings set org.gnome.desktop.interface cursor-size $cursorSize

# Location provider and night light
exec-once = sleep 5 && /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 5 && gammastep

# Forward bluetooth media commands to MPRIS
exec-once = sleep 4 && mpris-proxy

# Keep floating windows under normal Hyprland control.
# exec-once = sleep 3 && caelestia resizer -d

# Start shell
exec-once = bash ~/.config/hypr/scripts/portal.sh
# Managed by ~/.config/systemd/user/caelestia-quickshell.service for reliable startup ordering.
# exec-once = caelestia shell -d
exec-once = sleep 8 && kdeconnect-indicator
exec-once = sleep 5 && copyq --start-server
# exec-once = fusuma -d
# ydotoold is already managed by the user ydotool.service.
# Disabled after Caelestia 2.0.2/Quickshell update recovery: autolock can trap login
# behind the shell while the QML layer is recovering.
# exec-once = sleep 2 && hyprctl dispatch global caelestia:lock
exec-once = sleep 8 && easyeffects --gapplication-service
